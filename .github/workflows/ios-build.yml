name: Build iOS MOBILEA Dispatch
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Selectionner Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null || echo "x"
      - name: Decompresser
        run: unzip -o "MOBILEA Dispatch.zip" -d .
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd src
          pod install --repo-update
      - name: Compiler SEULEMENT le storyboard pour voir l erreur
        run: |
          cd src
          SB="MOBILEA Dispatch/Base.lproj/Main.storyboard"
          echo "=== ERREUR EXACTE DU STORYBOARD ==="
          ibtool --errors --warnings --output-format human-readable-text "$SB" 2>&1 | head -40 || true
          echo "=== FIN ==="
