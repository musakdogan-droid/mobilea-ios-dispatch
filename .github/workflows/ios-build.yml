name: Build iOS MOBILEA Dispatch
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Selectionner Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null || sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null || echo "x"
          xcodebuild -version
      - name: Decompresser le zip Dispatch
        run: |
          unzip -o "MOBILEA Dispatch.zip" -d .
      - name: DIAGNOSTIC - verifier le contenu reel
        run: |
          echo "=== Main.storyboard (references problematiques) ==="
          grep -o 'image="[^"]*"\|systemColor="[^"]*"' "src/MOBILEA Dispatch/Base.lproj/Main.storyboard" | sort -u || echo "AUCUNE - fichier propre"
          echo ""
          echo "=== LaunchIcon Contents.json scales ==="
          grep '"scale"' "src/MOBILEA Dispatch/Assets.xcassets/LaunchIcon.imageset/Contents.json"
          echo ""
          echo "=== toolsVersion des storyboards ==="
          grep -o 'toolsVersion="[^"]*"' "src/MOBILEA Dispatch/Base.lproj/Main.storyboard"
          echo ""
          echo "=== Contenu de AppIcon Contents.json (extrait) ==="
          head -20 "src/MOBILEA Dispatch/Assets.xcassets/AppIcon.appiconset/Contents.json"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd src
          pod install --repo-update
      - name: Import Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build Archive VERBOSE
        run: |
          cd src
          set -o pipefail
          xcodebuild archive \
            -workspace "MOBILEA Dispatch.xcworkspace" \
            -scheme "MOBILEA Dispatch" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MOBILEA_Dispatch.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -i "error:\|error \|\.storyboard\|actool\|ibtool\|failed\|The document" | tail -50
      - name: Upload logs si echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /Users/runner/Library/Developer/Xcode/DerivedData
