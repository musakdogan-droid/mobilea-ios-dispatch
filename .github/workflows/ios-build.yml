name: Build iOS MOBILEA Dispatch
on:
  push:
    branches: [ main ]
jobs:
  build: 
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Selectionner Xcode 26
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null || sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer 2>/dev/null || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer 2>/dev/null || echo "Xcode 26 introuvable"
          xcodebuild -version
      - name: Decompresser le zip Dispatch
        run: |
          unzip -o "MOBILEA Dispatch.zip" -d .
          ls -la src
      - name: Corriger LaunchScreen storyboard
        run: |
          SB=$(find src -name "LaunchScreen.storyboard" | head -1)
          echo "Storyboard trouve: $SB"
          cat > "$SB" << 'STORYBOARD'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="22505" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="22504"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="4mO-e4-REQ">
                                  <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                  <autoresizingMask key="autoresizingMask" flexibleMaxX="YES" flexibleMaxY="YES"/>
                                  <viewLayoutGuide key="safeArea" id="XpK-Bq-A7U"/>
                                  <color key="backgroundColor" white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                  </scene>
              </scenes>
          </document>
          STORYBOARD
          echo "=== Storyboard remplace ==="
          cat "$SB"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd src
          pod install --repo-update
      - name: Import Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
          security find-identity -v -p codesigning build.keychain
      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build Archive
        run: |
          cd src
          xcodebuild archive \
            -workspace "MOBILEA Dispatch.xcworkspace" \
            -scheme "MOBILEA Dispatch" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MOBILEA_Dispatch.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA
        run: |
          cat > /tmp/exportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>PUZZP2FP89</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>fr.mobilea.dispatch</key>
              <string>MOBILEA Dispatch Distribution</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/MOBILEA_Dispatch.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/exportOptions.plist
      - name: Upload vers App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          KEY_ID_CLEAN=$(printf '%s' "$API_KEY_ID" | tr -d ' \r\n')
          ISSUER_CLEAN=$(printf '%s' "$API_ISSUER_ID" | tr -d ' \r\n')
          KEYFILE=~/private_keys/AuthKey_${KEY_ID_CLEAN}.p8
          printf '%s' "$API_KEY_RAW" > /tmp/rawkey.txt
          if grep -q "BEGIN PRIVATE KEY" /tmp/rawkey.txt; then
            cp /tmp/rawkey.txt "$KEYFILE"
          else
            printf '%s' "$API_KEY_RAW" | tr -d ' \r\n' | base64 -d > "$KEYFILE"
          fi
          chmod 600 "$KEYFILE"
          if openssl pkey -in "$KEYFILE" -noout 2>/dev/null; then
            echo "CLE VALIDE"
          else
            echo "CLE INVALIDE"
            exit 1
          fi
          xcrun altool --upload-app \
            --file "$(ls "$RUNNER_TEMP"/export/*.ipa)" \
            --type ios \
            --apiKey "$KEY_ID_CLEAN" \
            --apiIssuer "$ISSUER_CLEAN"
          rm -f "$KEYFILE"
      - name: Upload logs si echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /Users/runner/Library/Developer/Xcode/DerivedData
