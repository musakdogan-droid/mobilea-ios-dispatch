name: Build iOS MOBILEA Dispatch
on:
  push:
    branches: [ main ]
jobs:
  build: 
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Selectionner Xcode 26 et installer plateforme iOS
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null || sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null || echo "x"
          xcodebuild -version
          echo "=== Plateformes disponibles ==="
          xcodebuild -showsdks 2>/dev/null | grep -i ios || echo "aucun SDK iOS"
          echo "=== Installation plateforme iOS ==="
          xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || echo "download echoue, on continue"
      - name: Decompresser
        run: unzip -o "MOBILEA Dispatch.zip" -d .
      - name: Diagnostic structure du projet
        run: |
          echo "=== Contenu de src/ ==="
          ls -la src/ || echo "pas de src/"
          echo ""
          echo "=== Tous les Info.plist (hors Pods) ==="
          find src -name "Info.plist" -not -path "*/Pods/*" 2>/dev/null || echo "aucun"
          echo ""
          echo "=== Le .xcodeproj ==="
          find src -maxdepth 2 -name "*.xcodeproj" 2>/dev/null || echo "aucun"
      - name: Ajouter GoogleService-Info.plist
        run: |
          set -e
          if [ ! -f "GoogleService-Info.plist" ]; then
            echo "ERREUR : GoogleService-Info.plist introuvable a la racine du depot !"
            exit 1
          fi
          echo "=== Placement du GoogleService-Info.plist ==="
          # 1) Copie a la racine de src/ (emplacement le plus courant pour PWABuilder)
          cp -f "GoogleService-Info.plist" "src/GoogleService-Info.plist"
          echo "Copie dans src/"
          # 2) Copie a cote de CHAQUE Info.plist de l'app (hors Pods), au cas ou
          #    Xcode le cherche dans le dossier du groupe principal.
          for INFO in $(find src -name "Info.plist" -not -path "*/Pods/*" 2>/dev/null); do
            DIR=$(dirname "$INFO")
            if [ "$DIR" != "src" ] && [ "$DIR" != "." ]; then
              cp -f "GoogleService-Info.plist" "$DIR/GoogleService-Info.plist"
              echo "Copie dans $DIR"
            fi
          done
          echo "=== Emplacements finaux du plist ==="
          find src -name "GoogleService-Info.plist"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd src
          pod install --repo-update
      - name: Import Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build Archive
        run: |
          cd src
          xcodebuild archive \
            -workspace "MOBILEA Dispatch.xcworkspace" \
            -scheme "MOBILEA Dispatch" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MOBILEA_Dispatch.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA
        run: |
          cat > /tmp/exportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>PUZZP2FP89</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>fr.mobilea.dispatch</key>
              <string>MOBILEA Dispatch Distribution</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/MOBILEA_Dispatch.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist /tmp/exportOptions.plist
      - name: Upload vers App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_RAW: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          KEY_ID_CLEAN=$(printf '%s' "$API_KEY_ID" | tr -d ' \r\n')
          ISSUER_CLEAN=$(printf '%s' "$API_ISSUER_ID" | tr -d ' \r\n')
          KEYFILE=~/private_keys/AuthKey_${KEY_ID_CLEAN}.p8
          printf '%s' "$API_KEY_RAW" > /tmp/rawkey.txt
          if grep -q "BEGIN PRIVATE KEY" /tmp/rawkey.txt; then
            cp /tmp/rawkey.txt "$KEYFILE"
          else
            printf '%s' "$API_KEY_RAW" | tr -d ' \r\n' | base64 -d > "$KEYFILE"
          fi
          chmod 600 "$KEYFILE"
          xcrun altool --upload-app \
            --file "$(ls "$RUNNER_TEMP"/export/*.ipa)" \
            --type ios \
            --apiKey "$KEY_ID_CLEAN" \
            --apiIssuer "$ISSUER_CLEAN"
          rm -f "$KEYFILE"
      - name: Upload logs si echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /Users/runner/Library/Developer/Xcode/DerivedData
